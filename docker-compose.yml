# =============================================================================
# Stack de monitoring complete : Prometheus + Grafana + Node Exporter
# =============================================================================
# Tout demarre avec : docker compose up -d
# Grafana est accessible sur http://localhost:3000 (admin/admin)
# Prometheus sur http://localhost:9090
# =============================================================================

services:
  # --- Application Flask avec metriques Prometheus ---
  # Expose des metriques custom : compteurs de requetes, latence, erreurs
  app:
    build: ./app
    container_name: flask-app
    ports:
      - "5000:5000"
    restart: unless-stopped
    labels:
      - "monitoring=true"

  # --- Prometheus : collecte et stocke les metriques ---
  # Scrape les metriques de l'app Flask et de Node Exporter toutes les 15s
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      # Retention de 15 jours (par defaut c'est 15j, on le rend explicite)
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  # --- Grafana : visualisation des metriques ---
  # Le dashboard est provisionne automatiquement au demarrage
  # Login par defaut : admin / admin
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      # Desactiver le login obligatoire pour simplifier l'acces en demo
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      # Provisioning automatique : datasource + dashboard au demarrage
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  # --- Node Exporter : metriques systeme (CPU, RAM, disque, reseau) ---
  # Expose les metriques de la machine hote au format Prometheus
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    # Monter les filesystems en read-only pour collecter les metriques
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    restart: unless-stopped

# Volumes persistants pour ne pas perdre les donnees au restart
volumes:
  prometheus-data:
  grafana-data:
