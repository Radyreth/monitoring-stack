# =============================================================================
# Provisioning automatique du dashboard Grafana
# =============================================================================
# Ce fichier indique a Grafana de charger les dashboards JSON
# depuis le dossier /etc/grafana/provisioning/dashboards/ au demarrage.
# =============================================================================

apiVersion: 1

providers:
  - name: "default"
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    editable: true
    options:
      # Chemin ou Grafana cherche les fichiers JSON de dashboards
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
